<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>vibeMail</title>
  <script type="application/vnd.vag+json">
  {
    "id": "vibeops.vibemail",
    "name": "vibeMail",
    "version": "0.1.1",
    "author": "vibeops",
    "category": "Productivity",
    "description": "JMAP Mail & Kalender Client für Stalwart",
    "icon": "📧",
    "permissions": ["readFile", "writeFile"],
    "minVibeAgentGo": "2607.9.4",
    "license": "MIT"
  }
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      display: flex;
      flex-direction: column;
    }
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }
    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      flex-shrink: 0;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header-actions {
      display: flex;
      gap: 8px;
    }
    .btn {
      padding: 6px 12px;
      border: 1px solid #30363d;
      background: #21262d;
      color: #e6edf3;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s;
    }
    .btn:hover { background: #30363d; }
    .btn.primary {
      background: #238636;
      border-color: #238636;
    }
    .btn.primary:hover { background: #2ea043; }
    /* Tabs */
    .tabs {
      display: flex;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      flex-shrink: 0;
    }
    .tab {
      padding: 10px 20px;
      cursor: pointer;
      font-size: 14px;
      color: #8b949e;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .tab:hover { color: #e6edf3; }
    .tab.active {
      color: #e6edf3;
      border-bottom-color: #f78166;
    }
    /* Main content */
    .content {
      flex: 1;
      overflow: hidden;
      display: flex;
    }
    .panel {
      display: none;
      width: 100%;
      height: 100%;
      overflow: hidden;
      flex-direction: column;
    }
    .panel.active { display: flex; }
    /* Mail list */
    .mail-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .mail-item {
      padding: 12px;
      border-bottom: 1px solid #21262d;
      cursor: pointer;
      transition: background 0.1s;
    }
    .mail-item:hover { background: #161b22; }
    .mail-item.unread { font-weight: 600; }
    .mail-item .from { font-size: 14px; margin-bottom: 4px; }
    .mail-item .subject { font-size: 13px; color: #8b949e; margin-bottom: 2px; }
    .mail-item .date { font-size: 12px; color: #6e7681; }
    /* Mail detail */
    .mail-detail {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: none;
    }
    .mail-detail.active { display: block; }
    .mail-detail .header {
      background: none;
      border: none;
      padding: 0 0 16px 0;
      border-bottom: 1px solid #30363d;
      margin-bottom: 16px;
    }
    .mail-detail .subject { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .mail-detail .meta { font-size: 13px; color: #8b949e; margin-bottom: 4px; }
    .mail-detail .body {
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    /* Compose */
    .compose-form {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: none;
      flex-direction: column;
      gap: 12px;
    }
    .compose-form.active { display: flex; }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .form-group label {
      font-size: 12px;
      color: #8b949e;
      font-weight: 500;
    }
    .form-group input,
    .form-group textarea {
      padding: 8px 12px;
      border: 1px solid #30363d;
      background: #0d1117;
      color: #e6edf3;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
    }
    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #58a6ff;
    }
    .form-group textarea {
      min-height: 200px;
      resize: vertical;
    }
    /* Calendar */
    .calendar-view {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }
    .calendar-week {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 16px;
    }
    .calendar-day {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      min-height: 100px;
      padding: 8px;
    }
    .calendar-day-header {
      font-size: 12px;
      color: #8b949e;
      margin-bottom: 6px;
      text-align: center;
    }
    .calendar-event {
      background: #1f6feb;
      border-radius: 4px;
      padding: 4px 6px;
      margin-bottom: 4px;
      font-size: 11px;
      cursor: pointer;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .calendar-event.private { background: #8957e5; }
    /* Loading & empty states */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      color: #8b949e;
    }
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      color: #8b949e;
      text-align: center;
    }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    /* Setup form */
    .setup-form {
      max-width: 400px;
      margin: 40px auto;
      padding: 24px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
    }
    .setup-form h2 { margin-bottom: 16px; font-size: 18px; }
    .setup-form .form-group { margin-bottom: 12px; }
    /* Responsive */
    @media (max-width: 640px) {
      .calendar-week { grid-template-columns: repeat(3, 1fr); }
      .header h1 { font-size: 16px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Setup Screen -->
    <div id="setupScreen" class="setup-form">
      <h2>📧 vibeMail Setup</h2>
      <div class="form-group">
        <label>JMAP Server URL</label>
        <input type="text" id="setupUrl" placeholder="https://pim.vibeops.de" value="https://pim.vibeops.de">
      </div>
      <div class="form-group">
        <label>Benutzername</label>
        <input type="text" id="setupUser" placeholder="lars.greipl">
      </div>
      <div class="form-group">
        <label>App-Passwort</label>
        <input type="password" id="setupPass" placeholder="app_...">
      </div>
      <button class="btn primary" onclick="saveSetup()">Verbinden</button>
    </div>

    <!-- Main App (hidden until setup) -->
    <div id="mainApp" style="display:none; flex-direction:column; height:100%;">
      <div class="header">
        <h1>📧 vibeMail</h1>
        <div class="header-actions">
          <button class="btn" onclick="refreshAll()">🔄</button>
          <button class="btn" onclick="showCompose()">✏️ Neu</button>
        </div>
      </div>
      <div class="tabs">
        <div class="tab active" onclick="switchTab('mail')" data-tab="mail">📬 Posteingang</div>
        <div class="tab" onclick="switchTab('calendar')" data-tab="calendar">📅 Kalender</div>
      </div>
      <div class="content">
        <!-- Mail Panel -->
        <div id="mailPanel" class="panel active">
          <div id="mailList" class="mail-list">
            <div class="loading">Lade Mails...</div>
          </div>
          <div id="mailDetail" class="mail-detail">
            <div class="header">
              <button class="btn" onclick="closeMailDetail()">← Zurück</button>
            </div>
            <div class="subject" id="detailSubject"></div>
            <div class="meta" id="detailFrom"></div>
            <div class="meta" id="detailDate"></div>
            <div class="body" id="detailBody"></div>
          </div>
        </div>
        <!-- Calendar Panel -->
        <div id="calendarPanel" class="panel">
          <div class="calendar-view">
            <div class="calendar-week" id="calendarWeek"></div>
            <div id="calendarEvents"></div>
          </div>
        </div>
      </div>
      <!-- Compose Panel -->
      <div id="composePanel" class="compose-form">
        <div class="header">
          <h2>✏️ Neue Mail</h2>
          <button class="btn" onclick="hideCompose()">✕</button>
        </div>
        <div class="form-group">
          <label>An</label>
          <input type="email" id="composeTo" placeholder="empfaenger@example.com">
        </div>
        <div class="form-group">
          <label>Betreff</label>
          <input type="text" id="composeSubject" placeholder="Betreff">
        </div>
        <div class="form-group">
          <label>Nachricht</label>
          <textarea id="composeBody" placeholder="Nachricht..."></textarea>
        </div>
        <button class="btn primary" onclick="sendMail()">Senden</button>
      </div>
    </div>
  </div>

  <script>
    // ============================================================
    // vibeMail — JMAP Client für Stalwart
    // ============================================================

    let jmapUrl = '';
    let jmapUser = '';
    let jmapPass = '';
    let accountId = '';
    let inboxId = '';
    let identityId = '';
    let currentView = 'list'; // 'list' | 'detail'

    // --- Setup ---

    function saveSetup() {
      jmapUrl = document.getElementById('setupUrl').value.replace(/\/$/, '');
      jmapUser = document.getElementById('setupUser').value;
      jmapPass = document.getElementById('setupPass').value;

      // Test connection: fetch the real accountId from the session first
      jmapSession()
        .then(session => {
          accountId = session.primaryAccounts['urn:ietf:params:jmap:mail'];
          if (!accountId) throw new Error('Kein Mail-Account in der JMAP-Session gefunden');
          return jmapRequest('Mailbox/get', { accountId, ids: null });
        })
        .then(() => {
          document.getElementById('setupScreen').style.display = 'none';
          document.getElementById('mainApp').style.display = 'flex';
          init();
        })
        .catch(err => {
          alert('Verbindung fehlgeschlagen: ' + err.message);
        });
    }

    // --- JMAP Helpers ---

    function getAuthHeader() {
      return 'Basic ' + btoa(jmapUser + ':' + jmapPass);
    }

    async function jmapRequest(method, args) {
      const payload = {
        using: ['urn:ietf:params:jmap:core', 'urn:ietf:params:jmap:mail', 'urn:ietf:params:jmap:calendars'],
        methodCalls: [[method, args, '0']]
      };

      const target = jmapUrl + '/jmap/';
      const fetchFn = window.corsFetch || fetch;
      const res = await fetchFn(target, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': getAuthHeader()
        },
        body: JSON.stringify(payload)
      });

      if (!res.ok) {
        throw new Error('HTTP ' + res.status);
      }

      const data = await res.json();
      const response = data.methodResponses[0];
      if (response[0] === 'error') {
        throw new Error(response[1].description || 'JMAP error');
      }
      return response[1];
    }

    async function jmapSession() {
      const target = jmapUrl + '/.well-known/jmap';
      const fetchFn = window.corsFetch || fetch;
      const res = await fetchFn(target, {
        headers: { 'Authorization': getAuthHeader() },
        redirect: 'follow'
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    }

    // --- Init ---

    async function init() {
      try {
        const session = await jmapSession();
        accountId = session.primaryAccounts['urn:ietf:params:jmap:mail'];

        // Find INBOX
        const mailboxes = await jmapRequest('Mailbox/get', { accountId, ids: null });
        const inbox = mailboxes.list.find(m => m.role === 'inbox' || m.name.toLowerCase() === 'inbox');
        inboxId = inbox ? inbox.id : null;

        // Find identity
        const identities = await jmapRequest('Identity/get', { accountId, ids: null });
        identityId = identities.list[0]?.id;

        await loadMailList();
      } catch (err) {
        console.error('Init error:', err);
        document.getElementById('mailList').innerHTML =
          '<div class="empty"><div class="empty-icon">⚠️</div>Fehler: ' + err.message + '</div>';
      }
    }

    // --- Mail ---

    async function loadMailList() {
      const listEl = document.getElementById('mailList');
      listEl.innerHTML = '<div class="loading">Lade Mails...</div>';

      try {
        const query = await jmapRequest('Email/query', {
          accountId,
          filter: inboxId ? { inMailbox: inboxId } : {},
          sort: [{ property: 'receivedAt', isAscending: false }],
          limit: 30
        });

        if (!query.ids || query.ids.length === 0) {
          listEl.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>Keine Mails</div>';
          return;
        }

        const emails = await jmapRequest('Email/get', {
          accountId,
          ids: query.ids,
          properties: ['id', 'subject', 'from', 'receivedAt', 'preview', 'keywords']
        });

        listEl.innerHTML = '';
        emails.list.forEach(mail => {
          const item = document.createElement('div');
          item.className = 'mail-item' + (mail.keywords?.$seen ? '' : ' unread');
          const from = mail.from?.[0]?.email || 'Unbekannt';
          const date = new Date(mail.receivedAt).toLocaleString('de-DE', {
            day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit'
          });
          item.innerHTML = `
            <div class="from">${escapeHtml(from)}</div>
            <div class="subject">${escapeHtml(mail.subject || '(kein Betreff)')}</div>
            <div class="date">${date}</div>
          `;
          item.onclick = () => showMailDetail(mail.id);
          listEl.appendChild(item);
        });
      } catch (err) {
        listEl.innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div>Fehler: ' + err.message + '</div>';
      }
    }

    async function showMailDetail(id) {
      const listEl = document.getElementById('mailList');
      const detailEl = document.getElementById('mailDetail');

      try {
        const res = await jmapRequest('Email/get', {
          accountId,
          ids: [id],
          properties: ['id', 'subject', 'from', 'to', 'receivedAt', 'textBody', 'bodyValues', 'htmlBody']
        });

        const mail = res.list[0];
        if (!mail) throw new Error('Mail nicht gefunden');

        document.getElementById('detailSubject').textContent = mail.subject || '(kein Betreff)';
        document.getElementById('detailFrom').textContent = 'Von: ' + (mail.from?.[0]?.email || '?');
        document.getElementById('detailDate').textContent = new Date(mail.receivedAt).toLocaleString('de-DE');

        // Get body
        let body = '';
        if (mail.bodyValues) {
          const partId = Object.keys(mail.bodyValues)[0];
          body = mail.bodyValues[partId]?.value || '';
        }
        document.getElementById('detailBody').textContent = body;

        listEl.style.display = 'none';
        detailEl.classList.add('active');
        currentView = 'detail';
      } catch (err) {
        alert('Fehler: ' + err.message);
      }
    }

    function closeMailDetail() {
      document.getElementById('mailList').style.display = 'block';
      document.getElementById('mailDetail').classList.remove('active');
      currentView = 'list';
    }

    // --- Compose ---

    function showCompose() {
      document.getElementById('composePanel').classList.add('active');
    }

    function hideCompose() {
      document.getElementById('composePanel').classList.remove('active');
    }

    async function sendMail() {
      const to = document.getElementById('composeTo').value;
      const subject = document.getElementById('composeSubject').value;
      const body = document.getElementById('composeBody').value;

      if (!to || !subject) {
        alert('An und Betreff sind Pflichtfelder');
        return;
      }

      try {
        // Find Drafts mailbox
        const mailboxes = await jmapRequest('Mailbox/get', { accountId, ids: null });
        const drafts = mailboxes.list.find(m => m.role === 'drafts');
        if (!drafts) throw new Error('Kein Entwürfe-Ordner gefunden');

        // Create draft
        const draft = await jmapRequest('Email/set', {
          accountId,
          create: {
            draft1: {
              mailboxIds: { [drafts.id]: true },
              from: [{ email: jmapUser + '@vibeops.de' }],
              to: [{ email: to }],
              subject,
              bodyValues: { body: { value: body } },
              textBody: [{ partId: 'body', type: 'text/plain' }]
            }
          }
        });

        const emailId = draft.created?.draft1?.id;
        if (!emailId) throw new Error('Draft konnte nicht erstellt werden');

        // Submit
        await jmapRequest('EmailSubmission/set', {
          accountId,
          create: {
            sub1: { identityId, emailId }
          }
        });

        alert('Mail gesendet!');
        hideCompose();
        document.getElementById('composeTo').value = '';
        document.getElementById('composeSubject').value = '';
        document.getElementById('composeBody').value = '';
      } catch (err) {
        alert('Fehler: ' + err.message);
      }
    }

    // --- Calendar ---

    async function loadCalendar() {
      const weekEl = document.getElementById('calendarWeek');
      weekEl.innerHTML = '';

      const now = new Date();
      const monday = new Date(now);
      monday.setDate(now.getDate() - now.getDay() + 1);

      const days = ['Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa', 'So'];
      const dayDates = [];

      for (let i = 0; i < 7; i++) {
        const d = new Date(monday);
        d.setDate(monday.getDate() + i);
        dayDates.push(d);

        const dayEl = document.createElement('div');
        dayEl.className = 'calendar-day';
        dayEl.innerHTML = `<div class="calendar-day-header">${days[i]} ${d.getDate()}.${d.getMonth()+1}.</div>`;
        weekEl.appendChild(dayEl);
      }

      try {
        const start = dayDates[0].toISOString().split('T')[0] + 'T00:00:00Z';
        const end = dayDates[6].toISOString().split('T')[0] + 'T23:59:59Z';

        const query = await jmapRequest('CalendarEvent/query', {
          accountId,
          filter: {},
          sort: [{ property: 'start', isAscending: true }],
          limit: 50
        });

        if (!query.ids || query.ids.length === 0) return;

        const events = await jmapRequest('CalendarEvent/get', {
          accountId,
          ids: query.ids
        });

        events.list.forEach(ev => {
          const startDt = new Date(ev.start);
          const dayIndex = Math.floor((startDt - dayDates[0]) / (1000 * 60 * 60 * 24));
          if (dayIndex >= 0 && dayIndex < 7) {
            const dayEl = weekEl.children[dayIndex];
            const eventEl = document.createElement('div');
            eventEl.className = 'calendar-event' + (ev.privacy === 'private' ? ' private' : '');
            eventEl.textContent = (ev.title || 'Termin').substring(0, 20);
            eventEl.title = ev.title;
            dayEl.appendChild(eventEl);
          }
        });
      } catch (err) {
        console.error('Calendar error:', err);
      }
    }

    // --- UI ---

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');

      document.getElementById('mailPanel').classList.remove('active');
      document.getElementById('calendarPanel').classList.remove('active');
      document.getElementById(tab + 'Panel').classList.add('active');

      if (tab === 'calendar') loadCalendar();
    }

    function refreshAll() {
      if (document.getElementById('mailPanel').classList.contains('active')) {
        loadMailList();
      } else {
        loadCalendar();
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // --- Bridge Check ---

    function waitForBridge() {
      if (window.vibeAgentGo) {
        // Try to load saved config
        window.vibeAgentGo.readFile('apps/Productivity/vibeops.vibemail/config.json')
          .then(res => {
            if (res?.data) {
              const cfg = JSON.parse(res.data);
              document.getElementById('setupUrl').value = cfg.url || 'https://pim.vibeops.de';
              document.getElementById('setupUser').value = cfg.user || '';
              document.getElementById('setupPass').value = cfg.pass || '';
            }
          })
          .catch(() => {});
      } else {
        setTimeout(waitForBridge, 100);
      }
    }
    waitForBridge();
  </script>
</body>
</html>
